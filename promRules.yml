apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: aiops-recording-rules
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: aiops.node
      interval: 30s
      rules:
        - record: aiops:node_cpu_pct
          expr: '100 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100'

        - record: aiops:node_mem_available_ratio
          expr: 'avg(node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)'

#        - record: aiops:node_disk_available_ratio
#          expr: >
#            min by (instance) (
#              node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"}
#              / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"}
#            )
#        - record: aiops:node_load1
#          expr: 'avg(node_load1)'

    - name: aiops.container
      interval: 30s
      rules:
        - record: aiops:container_mem_bytes
          expr: >
            max(container_memory_usage_bytes{
              namespace="kubeflow", container!="", container!="POD", container!="mysql", container!="minio"
            })

        - record: aiops:container_cpu_throttle_ratio
          expr: >
            (
              (sum(rate(container_cpu_cfs_throttled_periods_total{container!=""}[5m])) or vector(0))
              / 
              (sum(rate(container_cpu_cfs_periods_total{container!=""}[5m])) > 0)
            ) or vector(0)

        - record: aiops:container_oom_kills
          expr: >
            sum(kube_pod_container_status_last_terminated_reason{
              namespace="kubeflow", reason="OOMKilled"
            }) or vector(0)

    - name: aiops.workload
      interval: 30s
      rules:
        - record: aiops:pod_restart_rate
          expr: >
            sum(rate(kube_pod_container_status_restarts_total{namespace="kubeflow"}[15m]))

        - record: aiops:pods_not_running
          expr: count(kube_pod_status_phase{phase!~"Running|Succeeded|Succeeded|Completed|Unknown"} == 1) or vector(0)

        - record: aiops:deployment_unavailable_ratio
          expr: >
            sum(kube_deployment_status_replicas_unavailable{namespace="kubeflow"}) /
            (sum(kube_deployment_status_replicas{namespace="kubeflow"}) + 0.001)

    - name: aiops.network
      interval: 30s
      rules:
        - record: aiops:net_receive_bytes_rate
          expr: >
            sum(rate(node_network_receive_bytes_total{device="eth0"}[5m]))
        

        - record: aiops:net_transmit_bytes_rate
          expr: >
            sum(rate(node_network_transmit_bytes_total{device="eth0"}[5m]))
            

    - name: ml.anomaly.alerts
      rules:
        - alert: MLAnomalyDetected
          expr: ml_anomaly_severity > 0.5
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "ML anomaly detected"
            description: "Severity {{ $value | humanizePercentage }} — ensemble engine flagged an anomaly. Culprit metric needs investigation."

        - alert: MLAnomalyWarning
          expr: ml_anomaly_severity > 0.3
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "ML anomaly warning"
            description: "Severity {{ $value | humanizePercentage }} — elevated anomaly score for 2 minutes."
