apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-monitoring-kube-prometheus-alertmanager
  namespace: monitoring
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
      slack_api_url: 'SLACK_WEBHOOK'
    inhibit_rules:
    - equal: [namespace, alertname]
      source_matchers: [severity = critical]
      target_matchers: [severity =~ warning|info]
    - equal: [namespace, alertname]
      source_matchers: [severity = warning]
      target_matchers: [severity = info]
    - equal: [namespace]
      source_matchers: [alertname = InfoInhibitor]
      target_matchers: [severity = info]
    - target_matchers: [alertname = InfoInhibitor]
    receivers:
    - name: "null"
    - name: slack-mlops
      slack_configs:
      - channel: '#mlops-alerts'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🚨{{ else }}✅{{ end }} {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Severity:* {{ .Labels.severity }}
          *Description:* {{ .Annotations.description }}
          {{ end }}
    route:
      group_by: [namespace]
      group_interval: 5m
      group_wait: 30s
      receiver: "null"
      repeat_interval: 12h
      routes:
      - matchers: [alertname = "Watchdog"]
        receiver: "null"
      - matchers: [alertname = "MLAnomalyDetected"]
        receiver: slack-mlops
        group_wait: 0s
        repeat_interval: 5m
      - matchers: [alertname = "MLAnomalyWarning"]
        receiver: slack-mlops
        group_wait: 2m
        repeat_interval: 30m
    templates:
    - /etc/alertmanager/config/*.tmpl
  EOF