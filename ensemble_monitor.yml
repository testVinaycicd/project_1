apiVersion: v1
kind: Service
metadata:
  name: ensemble-engine-metrics
  namespace: monitoring
  labels:
    app: ensemble-engine
    prometheus-scrape: "true"
spec:
  ports:
    - name: metrics
      port: 8000
      targetPort: 8000
  selector:
    app: ensemble-engine
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ensemble-engine-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      prometheus-scrape: "true"
  namespaceSelector:
    matchNames:
      - monitoring
  endpoints:
    - port: metrics
      interval: 30s